name: Linux

on:
  push:
    branches: [master,develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  pull_request:
    branches: [master,develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            coverage: true
            gcov_executable: gcov-14
            coverage_gate: true
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            coverage: true
            gcov_executable: "llvm-cov-18 gcov"

    runs-on: ubuntu-24.04
    name: ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      # The check body lives in the script so that its negative control can run
      # the same code that gates here; a check nobody has ever seen fail is not
      # a check.
      - name: Enforce no tests|lib -> benchmarks|python dependency edge
        if: matrix.compiler == 'gcc-14'
        run: |
          bash scripts/dependency_edge_check.sh
          bash scripts/dependency_edge_negative_control.sh

      - name: Install gcovr
        if: matrix.coverage
        run: pip install gcovr==8.6

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_FLAGS="-Werror -Wno-invalid-feature-combination --coverage" \
              -DCMAKE_C_FLAGS="--coverage" \
              -DARGMIN_BUILD_TESTS=ON \
              -DARGMIN_BUILD_BENCHMARKS=OFF \
              -DARGMIN_BUILD_EXAMPLES=OFF \
              -DARGMIN_CMAKE_FETCH_DEPS=ON
          else
            cmake . -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-Werror -Wno-invalid-feature-combination" \
              -DARGMIN_BUILD_TESTS=ON \
              -DARGMIN_BUILD_BENCHMARKS=OFF \
              -DARGMIN_BUILD_EXAMPLES=OFF \
              -DARGMIN_CMAKE_FETCH_DEPS=ON
          fi

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

      # Deletability enforcement. The allocation gates were re-homed out of the
      # benchmark tree into tests/, so they must register and run with the
      # benchmarks disabled (this leg builds -DARGMIN_BUILD_BENCHMARKS=OFF). A
      # label selection that matches nothing is a ctest success, so
      # --no-tests=error turns a silently dropped gate or a lost `alloc-gate`
      # label into a failure here instead of a vacuously green allocation claim.
      - name: Enforce the allocation gates run without benchmarks
        run: cd build && ctest --output-on-failure --no-tests=error -L alloc-gate

      # ctest suppresses a passing test's stdout, so the spread magnitude the
      # cross-path test reports is invisible under --output-on-failure. Run the
      # binary directly so every green run records the number, on every
      # architecture the bounded aggregate check has to hold on.
      - name: Record cross-path spread magnitude (x86_64)
        run: |
          ./build/tests/unit/argmin_unit_tests "projected_gn_policy: fixed-N path reproduces the dynamic-N trajectory"

      - name: Generate coverage
        if: matrix.coverage
        run: |
          gcovr build \
            --root . \
            --gcov-executable "${{ matrix.gcov_executable }}" \
            --filter 'lib/argmin/include/argmin/' \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --exclude 'detail/diagnostics/alloc_counter\.h' \
            --gcov-ignore-errors=source_not_found \
            --merge-mode-functions=separate \
            --xml coverage.xml

      - name: Coverage gate
        if: matrix.coverage_gate
        run: |
          gcovr build \
            --root . \
            --gcov-executable "${{ matrix.gcov_executable }}" \
            --filter 'lib/argmin/include/argmin/' \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --exclude 'detail/diagnostics/alloc_counter\.h' \
            --gcov-ignore-errors=source_not_found \
            --merge-mode-functions=separate \
            --json coverage.json
          python3 scripts/coverage_gate.py coverage.json scripts/coverage_floors.txt

      - name: Upload to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sanitize:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            cc: clang-18
            cxx: clang++-18
            flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"

    runs-on: ubuntu-24.04
    name: sanitize (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

  # MemorySanitizer requires the ENTIRE program -- including the C++ standard
  # library -- to be instrumented. Stock libstdc++ is not, which produces
  # false use-of-uninitialized reports deep inside std:: containers (e.g. in
  # Catch2's registry during static init). We build libc++/libc++abi with
  # -fsanitize=memory and link against them so the reports are real signal.
  #
  # The unwinder is deliberately NOT instrumented: an MSAN-built libunwind
  # reads its own register context (getReg) in a way MSAN treats as
  # uninitialized, which (a) false-positives on every ordinary C++ exception
  # unwind and (b) infinitely recurses -- and SIGSEGVs -- when MSAN unwinds to
  # print a real report, masking the finding. So libc++abi is pointed at the
  # platform unwinder (LIBCXXABI_USE_LLVM_UNWINDER=OFF, uninstrumented libgcc_s)
  # and fast_unwind_on_fatal keeps MSAN's own fatal traces off libunwind too.
  sanitize-msan:
    runs-on: ubuntu-24.04
    name: sanitize (msan, instrumented libc++)
    # Gating: observed green on develop 2026-07-13 (full ~36m run) once the
    # unwinder-instrumentation defect was fixed, so it is now a hard gate.
    continue-on-error: false

    env:
      LLVM_VER: "18.1.8"          # track the clang used below (clang-18)
      CC: clang-18
      CXX: clang++-18
      LIBCXX_MSAN: ${{ github.workspace }}/libcxx-msan

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 ninja-build cmake xz-utils

      # The instrumented libc++ is expensive to build (~10 min) but fully
      # deterministic for a fixed LLVM version + compiler, so cache it.
      - name: Cache instrumented libc++
        id: cache-libcxx
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBCXX_MSAN }}
          key: libcxx-msan-llvm${{ env.LLVM_VER }}-clang18-ubuntu24-v2

      - name: Build instrumented libc++
        if: steps.cache-libcxx.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/llvm-project-${LLVM_VER}.src.tar.xz"
          tar xf "llvm-project-${LLVM_VER}.src.tar.xz"
          cmake -G Ninja \
            -S "llvm-project-${LLVM_VER}.src/runtimes" \
            -B build-libcxx-msan \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DLLVM_USE_SANITIZER=MemoryWithOrigins \
            -DLIBCXXABI_USE_LLVM_UNWINDER=OFF \
            -DLIBCXX_INCLUDE_TESTS=OFF \
            -DLIBCXX_INCLUDE_BENCHMARKS=OFF \
            -DCMAKE_INSTALL_PREFIX="${LIBCXX_MSAN}"
          ninja -C build-libcxx-msan cxx cxxabi
          ninja -C build-libcxx-msan install-cxx install-cxxabi

      - name: Configure
        run: |
          MSAN="-fsanitize=memory -fsanitize-memory-track-origins=2 -fno-omit-frame-pointer -g"
          # Point compile + link at OUR instrumented libc++, and set rpath so
          # the test binary loads it at runtime (test discovery runs the
          # binary -- that is the step that crashes with stock libstdc++).
          CXX_FLAGS="$MSAN -stdlib=libc++ -nostdinc++ -isystem ${LIBCXX_MSAN}/include/c++/v1"
          LINK_FLAGS="$MSAN -stdlib=libc++ -L${LIBCXX_MSAN}/lib -Wl,-rpath,${LIBCXX_MSAN}/lib -lc++abi"
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$LINK_FLAGS" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          # fast_unwind_on_fatal keeps MSAN's fatal-report unwinding on frame
          # pointers (-fno-omit-frame-pointer is set) rather than libunwind.
          MSAN_OPTIONS: "abort_on_error=1 fast_unwind_on_fatal=1"
        run: cd build && ctest --output-on-failure

  warnings:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    runs-on: ubuntu-24.04
    name: warnings (${{ matrix.build_type }})

    # Gating: ARGMIN_WARNING_FLAGS is wired onto the header-compiling test
    # target and surfaced here with -Werror in both Debug and Release. The
    # headers build clean under it (the only failure had been a spurious
    # clang-18 avx10 driver warning on some runners, now suppressed), so
    # this is a hard gate -- a newly introduced warning fails the build.
    continue-on-error: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          # -Wno-invalid-feature-combination: clang-18 spuriously emits a
          # driver-level -Winvalid-feature-combination (avx10.1-256 ->
          # avx10.1-512) on some GitHub runner CPUs, with no -march set. Under
          # -Werror that fails the build on third-party (Catch2) sources for a
          # toolchain artifact unrelated to our code; suppress just that one.
          # gcc ignores the flag, so it is safe in the shared -Werror configs.
          cmake . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_FLAGS="-Werror -Wno-invalid-feature-combination" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

  labeled-instruments:
    runs-on: ubuntu-24.04
    name: labeled instruments (alloc-gate, oracle-pin)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        # The allocation gates live in the tests tree and link neither the
        # cross-solver comparison library nor the benchmark tree, so no NLopt
        # install is needed here. Benchmarks stay ON only so the citation
        # resolver below can reach the non-alloc cited cells (the deterministic
        # freedom scans and the fast regression gate).
        #
        # The libcmaes comparator runs its own find_package(Eigen3), which
        # fails under FetchContent'd Eigen (no Eigen3Config.cmake is
        # exported). It is an optional external CMA-ES baseline, not part of
        # the alloc-gate/oracle-pin determinism instruments, so build the
        # benchmarks without it.
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_BENCHMARKS=ON \
            -DARGMIN_BENCH_LIBCMAES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      # The gates are argmin-only correctness cases in the tests tree, so the
      # count is NLopt-independent. Assert it anyway so a silently dropped case
      # or `alloc-gate` label fails here instead of being reported as a green
      # allocation-free claim. The literal is deliberate -- adding or removing a
      # gate should force a visible edit. catch_discover_tests registers the
      # gates at build time, so this must run after the build (a pre-build
      # `ctest -N` would find zero).
      - name: Verify the full allocation-gate set registered
        run: |
          cd build
          # ctest right-aligns the test index, so a literal 'Test #' misses any
          # entry whose index is narrower than the widest one on the run. The
          # guard exists to catch a dropped gate; it must not miscount silently.
          count=$(ctest -N -L alloc-gate | grep -cE '^ *Test +#')
          echo "allocation gates registered: $count"
          test "$count" -eq 14 || { echo "expected 14 allocation gates, found $count"; exit 1; }

      # ctest treats a label selection that matches nothing as success, so
      # without --no-tests=error this step would pass if the labels it names
      # were renamed or deleted -- the job would go green having run nothing.
      # The fast regression gate here is a CORRECTNESS gate. It enforces
      # oracle-witnessed correctness (oracle verdict, final accuracy, feasibility,
      # solver status) on every baseline cell -- all toolchain-invariant. It does
      # NOT gate the performance CEILINGS: neither the iteration count
      # (max_outer_iters) nor the instruction cost (instructions/iter). Those are
      # decision-identity properties WITHIN a toolchain, not across toolchains --
      # this runner builds with clang against a gcc-calibrated baseline, so a
      # different iteration or instruction count is toolchain skew, not a
      # regression. They are reported NOT-GATED in the log (numbers shown) and
      # gate on the controlled host, whose compiler matches the baseline's, plus
      # the weekly regression-weekly tier. Green here means CORRECTNESS verified;
      # it does NOT mean iteration counts or instruction costs were verified.
      - name: Run alloc-gate, oracle-pin, and fast regression instruments (correctness gated; iteration + instruction ceilings NOT gated here)
        run: cd build && ctest --output-on-failure --no-tests=error -L "alloc-gate|oracle-pin|regression-fast"

      # The real-time safety matrix and the determinism page cite a named test,
      # label, or job for every claim they gate. This resolves each of those
      # names against live state and fails when one no longer exists -- so
      # renaming or deleting a cited artifact turns this job red instead of
      # leaving a document citing something nobody can run.
      #
      # It runs here, rather than in the lightweight documentation workflow,
      # because resolving names needs a tree configured with benchmarks on, with
      # the comparison library present, and built: without the build, test
      # registration reports placeholder case names and every citation would
      # look dangling at once. That is most of a build, and this job is already
      # exactly that tree. There is no blind spot in placing it here -- a rename
      # is a code change, never a documentation-only edit, so it always triggers
      # this workflow.
      #
      # Deliberately after the ctest step above, so that a gate which genuinely
      # fails is reported as a failing test rather than as a name that could not
      # be resolved.
      - name: Resolve the cited real-time evidence against the built tree
        run: |
          python3 scripts/rt_matrix.py resolve scripts/rt_matrix_cells.json build .github/workflows
          python3 scripts/rt_matrix.py resolve scripts/rt_matrix_tiers.json build .github/workflows

  install-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Build and install
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DARGMIN_CMAKE_FETCH_DEPS=OFF
          cmake --build build
          cmake --install build

      - name: Build consumer project
        run: |
          cmake tests/integration/consumer -B build-consumer \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-consumer

      - name: Run consumer test
        run: |
          ./build-consumer/integration_test

  system-eigen-suite:
    runs-on: ubuntu-24.04
    name: system-eigen (integration path)

    steps:
      - uses: actions/checkout@v4

      - name: Install system Eigen and Catch2
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev catch2

      - name: Configure (system deps, no FetchContent)
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=OFF

      - name: Build
        run: cmake --build build

      - name: Test (including the integration consumer path)
        run: cd build && ctest --output-on-failure

  standards:
    # Pins the language floor and both expected code paths. The C++20 leg
    # exercises the in-library expected fallback (libstdc++ only ships
    # <expected> at C++23); the C++23 leg exercises the std::expected
    # path. The standard is passed explicitly so each leg stays pinned
    # even if the root default moves.
    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [20, 23]

    runs-on: ubuntu-24.04
    name: c++${{ matrix.cxx_standard }} (build + ctest)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }} \
            -DCMAKE_CXX_FLAGS="-Werror -Wno-invalid-feature-combination" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_EXAMPLES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

  no-exceptions:
    runs-on: ubuntu-24.04
    name: exceptions-off (instantiation probe)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        # The probe target is built and linked with -fno-exceptions
        # -fno-rtti at the C++20 floor (flags are applied to the target in
        # tests/compile/CMakeLists.txt); a surviving throw or dynamic_cast on
        # any instantiated solver-policy or driver path fails this build. The
        # probe is a linked, executed binary -- header parsing alone would
        # pass with live throw sites, since neither construct is diagnosed in
        # an uninstantiated template, so the guarantee is exercised.
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_EXAMPLES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build instantiation probe
        run: cmake --build build --target argmin_no_exceptions_probe

      - name: Run instantiation probe
        run: ./build/tests/compile/argmin_no_exceptions_probe

  arm-no-exceptions-link:
    runs-on: ubuntu-24.04
    name: arm cross-compile-link (newlib-nano, -fno-exceptions)

    steps:
      - uses: actions/checkout@v4

      # Bare-metal Cortex-M7 cross toolchain + newlib(-nano). The Ubuntu
      # gcc-arm-none-eabi package bundles the nano.specs/nosys.specs multilibs
      # the link gate needs. CI pins this package's GCC (14.x on 24.04); the
      # flag set is version-stable against the authoring host's 16.1.0.
      - name: Install arm-none-eabi toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      # The standalone mcu/ project, link-gate-only: no linker script,
      # no startup, no CMSIS -- just cross-compile-and-link the four
      # RT-claimed solver policies under -fno-exceptions -fno-rtti with
      # --specs=nano.specs --specs=nosys.specs for Cortex-M7 hard-float. This
      # isolates the newlib-nano -fno-exceptions link behavior (missing
      # __cxa_* / _Unwind_* symbols under a reduced multilib) from every
      # firmware-image concern. Build-only, no hardware.
      - name: Configure firmware link gate
        run: |
          cmake -S mcu -B build-arm-gate \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/mcu/cmake/toolchain-arm-none-eabi.cmake" \
            -DMCU_LINK_GATE_ONLY=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build link gate
        run: cmake --build build-arm-gate --target argmin_arm_link_gate

      # A clean newlib-nano -fno-exceptions link resolves every C++ runtime
      # symbol: the final ELF must have zero undefined symbols. Any undefined
      # __cxa_*/_Unwind_* here is the exact multilib gap this gate exists to
      # catch on every commit.
      - name: Assert zero undefined symbols
        run: |
          elf=build-arm-gate/argmin_arm_link_gate.elf
          test -f "$elf" || { echo "link gate ELF not produced"; exit 1; }
          undef=$(arm-none-eabi-nm --undefined-only "$elf")
          if [ -n "$undef" ]; then
            echo "FAIL: link gate has undefined symbols:"; echo "$undef"; exit 1
          fi
          echo "PASS: newlib-nano -fno-exceptions link resolved every symbol"
          arm-none-eabi-size "$elf"

  python-bindings:
    runs-on: ubuntu-24.04
    name: python bindings (build + pytest)

    # The extension is gated behind an option that defaults off, so no other job
    # in this workflow builds it and none of them would notice it breaking. This
    # is the only job that will.
    steps:
      - uses: actions/checkout@v4

      # The runner image does not ship the generator this job's preset names,
      # and every other leg here configures without a preset, so nothing else
      # installs it. Without this step the configure step below fails outright.
      - name: Install the build generator
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Creates the repository-local environment and installs the exactly
      # pinned, binary-only dependency set into it and nowhere else.
      - name: Bootstrap the interpreter environment
        run: python3 scripts/bootstrap_python_env.py

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset python-bindings

      - name: Build
        run: cmake --build build/python -j2

      - name: Test
        run: ctest --test-dir build/python --output-on-failure

  examples:
    runs-on: ubuntu-24.04
    name: examples (build + run)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        # Build and run the runnable examples so they cannot bit-rot against
        # API changes: a broken example fails CI here, and running each one
        # catches a build that compiles but no longer converges.
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DARGMIN_BUILD_EXAMPLES=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build examples
        run: cmake --build build

      - name: Run examples
        run: |
          set -euo pipefail
          for ex in unconstrained_lbfgsb constrained_slsqp least_squares_lm \
                    derivative_free_bobyqa step_level_control; do
            echo "== ${ex} =="
            ./build/examples/"${ex}"
          done
