name: Linux

on:
  push:
    branches: [master,develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  pull_request:
    branches: [master,develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            coverage: true
            gcov_executable: gcov-14
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            coverage: true
            gcov_executable: "llvm-cov-18 gcov"

    runs-on: ubuntu-24.04
    name: ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install gcovr
        if: matrix.coverage
        run: pip install gcovr

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_FLAGS="-Werror --coverage" \
              -DCMAKE_C_FLAGS="--coverage" \
              -DARGMIN_BUILD_TESTS=ON \
              -DARGMIN_BUILD_EXAMPLES=OFF \
              -DARGMIN_CMAKE_FETCH_DEPS=ON
          else
            cmake . -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-Werror" \
              -DARGMIN_BUILD_TESTS=ON \
              -DARGMIN_BUILD_EXAMPLES=OFF \
              -DARGMIN_CMAKE_FETCH_DEPS=ON
          fi

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Generate coverage
        if: matrix.coverage
        run: |
          gcovr build \
            --root . \
            --gcov-executable "${{ matrix.gcov_executable }}" \
            --filter 'lib/argmin/include/argmin/' \
             \
            --gcov-ignore-errors=source_not_found \
            --xml coverage.xml

      - name: Upload to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sanitize:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            cc: clang-18
            cxx: clang++-18
            flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"

    runs-on: ubuntu-24.04
    name: sanitize (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

  # MemorySanitizer requires the ENTIRE program -- including the C++ standard
  # library -- to be instrumented. Stock libstdc++ is not, which produces
  # false use-of-uninitialized reports deep inside std:: containers (e.g. in
  # Catch2's registry during static init). We build libc++/libc++abi with
  # -fsanitize=memory and link against them so the reports are real signal.
  #
  # The unwinder is deliberately NOT instrumented: an MSAN-built libunwind
  # reads its own register context (getReg) in a way MSAN treats as
  # uninitialized, which (a) false-positives on every ordinary C++ exception
  # unwind and (b) infinitely recurses -- and SIGSEGVs -- when MSAN unwinds to
  # print a real report, masking the finding. So libc++abi is pointed at the
  # platform unwinder (LIBCXXABI_USE_LLVM_UNWINDER=OFF, uninstrumented libgcc_s)
  # and fast_unwind_on_fatal keeps MSAN's own fatal traces off libunwind too.
  sanitize-msan:
    runs-on: ubuntu-24.04
    name: sanitize (msan, instrumented libc++)
    # Non-gating until observed green at least once; then flip to false so it
    # becomes a hard gate. Do not merge as gating blind.
    continue-on-error: true

    env:
      LLVM_VER: "18.1.8"          # track the clang used below (clang-18)
      CC: clang-18
      CXX: clang++-18
      LIBCXX_MSAN: ${{ github.workspace }}/libcxx-msan

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 ninja-build cmake xz-utils

      # The instrumented libc++ is expensive to build (~10 min) but fully
      # deterministic for a fixed LLVM version + compiler, so cache it.
      - name: Cache instrumented libc++
        id: cache-libcxx
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBCXX_MSAN }}
          key: libcxx-msan-llvm${{ env.LLVM_VER }}-clang18-ubuntu24-v2

      - name: Build instrumented libc++
        if: steps.cache-libcxx.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/llvm-project-${LLVM_VER}.src.tar.xz"
          tar xf "llvm-project-${LLVM_VER}.src.tar.xz"
          cmake -G Ninja \
            -S "llvm-project-${LLVM_VER}.src/runtimes" \
            -B build-libcxx-msan \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DLLVM_USE_SANITIZER=MemoryWithOrigins \
            -DLIBCXXABI_USE_LLVM_UNWINDER=OFF \
            -DLIBCXX_INCLUDE_TESTS=OFF \
            -DLIBCXX_INCLUDE_BENCHMARKS=OFF \
            -DCMAKE_INSTALL_PREFIX="${LIBCXX_MSAN}"
          ninja -C build-libcxx-msan cxx cxxabi
          ninja -C build-libcxx-msan install-cxx install-cxxabi

      - name: Configure
        run: |
          MSAN="-fsanitize=memory -fsanitize-memory-track-origins=2 -fno-omit-frame-pointer -g"
          # Point compile + link at OUR instrumented libc++, and set rpath so
          # the test binary loads it at runtime (test discovery runs the
          # binary -- that is the step that crashes with stock libstdc++).
          CXX_FLAGS="$MSAN -stdlib=libc++ -nostdinc++ -isystem ${LIBCXX_MSAN}/include/c++/v1"
          LINK_FLAGS="$MSAN -stdlib=libc++ -L${LIBCXX_MSAN}/lib -Wl,-rpath,${LIBCXX_MSAN}/lib -lc++abi"
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$LINK_FLAGS" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          # fast_unwind_on_fatal keeps MSAN's fatal-report unwinding on frame
          # pointers (-fno-omit-frame-pointer is set) rather than libunwind.
          MSAN_OPTIONS: "abort_on_error=1 fast_unwind_on_fatal=1"
        run: cd build && ctest --output-on-failure

  warnings:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    runs-on: ubuntu-24.04
    name: warnings (${{ matrix.build_type }})

    # Advisory cell: ARGMIN_WARNING_FLAGS is now wired onto the
    # header-compiling test target and surfaced here with -Werror in
    # both Debug and Release so the flagged headers are visible. The
    # header fixes themselves are production-code changes out of scope
    # for the verification-instruments work, so this cell does not gate
    # the pipeline yet. Flip continue-on-error to false once the
    # flagged headers are cleaned up.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_FLAGS="-Werror" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

  labeled-instruments:
    runs-on: ubuntu-24.04
    name: labeled instruments (alloc-gate, oracle-pin)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        # The libcmaes comparator runs its own find_package(Eigen3), which
        # fails under FetchContent'd Eigen (no Eigen3Config.cmake is
        # exported). It is an optional external CMA-ES baseline, not part of
        # the alloc-gate/oracle-pin determinism instruments, so build the
        # benchmarks without it.
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_BENCHMARKS=ON \
            -DARGMIN_BENCH_LIBCMAES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Run alloc-gate and oracle-pin instruments
        run: cd build && ctest --output-on-failure -L "alloc-gate|oracle-pin"

  install-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Build and install
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DARGMIN_CMAKE_FETCH_DEPS=OFF
          cmake --build build
          cmake --install build

      - name: Build consumer project
        run: |
          cmake tests/integration/consumer -B build-consumer \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-consumer

      - name: Run consumer test
        run: |
          ./build-consumer/integration_test

  system-eigen-suite:
    runs-on: ubuntu-24.04
    name: system-eigen (integration path)

    steps:
      - uses: actions/checkout@v4

      - name: Install system Eigen and Catch2
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev catch2

      - name: Configure (system deps, no FetchContent)
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_CMAKE_FETCH_DEPS=OFF

      - name: Build
        run: cmake --build build

      - name: Test (including the integration consumer path)
        run: cd build && ctest --output-on-failure

  standards:
    # Pins the language floor and both expected code paths. The C++20 leg
    # exercises the in-library expected fallback (libstdc++ only ships
    # <expected> at C++23); the C++23 leg exercises the std::expected
    # path. The standard is passed explicitly so each leg stays pinned
    # even if the root default moves.
    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [20, 23]

    runs-on: ubuntu-24.04
    name: c++${{ matrix.cxx_standard }} (build + ctest)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }} \
            -DCMAKE_CXX_FLAGS="-Werror" \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_EXAMPLES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

  no-exceptions:
    runs-on: ubuntu-24.04
    name: exceptions-off (instantiation probe)

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        # The probe target is built and linked with -fno-exceptions
        # -fno-rtti at the C++20 floor (flags are applied to the target in
        # tests/compile/CMakeLists.txt); a surviving throw in any
        # instantiated solver-policy path fails this build. The probe is a
        # linked, executed binary -- header parsing alone would pass with
        # live throw sites, so the exceptions-off guarantee is exercised.
        run: |
          cmake . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DARGMIN_BUILD_TESTS=ON \
            -DARGMIN_BUILD_EXAMPLES=OFF \
            -DARGMIN_CMAKE_FETCH_DEPS=ON

      - name: Build instantiation probe
        run: cmake --build build --target argmin_no_exceptions_probe

      - name: Run instantiation probe
        run: ./build/tests/compile/argmin_no_exceptions_probe
