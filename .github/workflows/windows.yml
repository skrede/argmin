name: Windows

on:
  push:
    branches: [master,develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".planning/**"
  pull_request:
    branches: [master,develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".planning/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake . -B build -A x64 `
            -DARGMIN_BUILD_TESTS=ON `
            -DARGMIN_BUILD_EXAMPLES=OFF `
            -DARGMIN_CMAKE_FETCH_DEPS=ON `
            '-DCMAKE_CXX_FLAGS=/std:c++latest /W4'

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure --timeout 30

      # ctest suppresses a passing test's stdout, so the spread magnitude the
      # cross-path test reports is invisible under --output-on-failure. Surface
      # it on every green run, so the bounded aggregate check is pinned against
      # a number measured on every architecture it has to hold on.
      #
      # -V rather than a direct binary run: this generator is multi-config, so
      # the executable's directory depends on the configuration layout. -V
      # defeats the passing-test suppression without pinning that path.
      - name: Record cross-path spread magnitude (x86_64)
        run: cd build && ctest -C Release -V -R "reproduces the dynamic-N trajectory"

  install-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen
        run: vcpkg install eigen3:x64-windows

      - name: Configure
        run: |
          cmake . -B build -A x64 `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DARGMIN_CMAKE_FETCH_DEPS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            '-DCMAKE_CXX_FLAGS=/std:c++latest'

      - name: Build and install
        run: |
          cmake --build build --config Release
          cmake --install build --config Release

      - name: Build consumer
        run: |
          cmake tests/integration/consumer -B build-consumer -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            '-DCMAKE_CXX_FLAGS=/std:c++latest'
          cmake --build build-consumer --config Release

      - name: Run consumer test
        run: |
          build-consumer/Release/integration_test.exe
